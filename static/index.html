        :root {
            --azul-petroleo: #123047;
            --azul-institucional: #1E5A8A;
            --ciano-tecnico: #19A7B8;
            --cinza-fundo: #F4F7FA;
            --branco: #FFFFFF;
            --cinza-texto: #5E6B78;
            --cinza-linha: #D8E0E8;
            --verde-status: #2E9E64;

        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--cinza-fundo); min-height: 100vh; color: var(--azul-petroleo); font-size: 14px; line-height: 1.5; }
        .header { background: var(--branco); border-bottom: 1px solid var(--cinza-linha); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-icon { width: 44px; height: 44px; background: var(--azul-institucional); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--branco); }
        .header-title h1 { font-size: 20px; font-weight: 700; color: var(--azul-petroleo); margin-bottom: 2px; }
        .header-title p { font-size: 12px; color: var(--cinza-texto); font-weight: 400; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .header-date { font-size: 13px; color: var(--cinza-texto); padding: 8px 14px; background: var(--cinza-fundo); border-radius: 6px; }
        .lang-selector { display: flex; align-items: center; gap: 6px; padding: 4px; background: var(--cinza-fundo); border-radius: 8px; border: 1px solid var(--cinza-linha); }
        .lang-btn { width: 36px; height: 26px; border-radius: 4px; cursor: pointer; opacity: 0.5; transition: all 0.2s; border: 2px solid transparent; overflow: hidden; padding: 2px; background: var(--branco); display: flex; align-items: center; justify-content: center; }
        .lang-btn:hover { opacity: 0.8; }
        .lang-btn.active { opacity: 1; border-color: var(--azul-institucional); }
        .lang-btn svg { width: 100%; height: 100%; }
        
        .tabs-container { background: var(--branco); border-bottom: 1px solid var(--cinza-linha); padding: 0 40px; }
        .tabs { display: flex; gap: 0; }
        .tab { padding: 16px 24px; font-size: 14px; font-weight: 500; color: var(--cinza-texto); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab:hover { color: var(--azul-institucional); }
        .tab.active { color: var(--azul-institucional); border-bottom-color: var(--azul-institucional); }
        .tab-icon { margin-right: 8px; }
        
        .main-content { max-width: 1400px; margin: 0 auto; padding: 32px 40px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 24px; }
        .stats-grid-4 { grid-template-columns: repeat(4, 1fr); }
